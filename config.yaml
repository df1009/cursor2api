# Cursor2API v2 配置文件

# 服务端口
port: 3010

# 请求超时（秒）
timeout: 120

# 单代理设置（可选，proxy_pool 启用时此项忽略）
# proxy: "http://127.0.0.1:7890"

# 代理池设置（多代理轮询，并发隔离，自动健康检测）
proxy_pool:
  enabled: true
  ttl_sec: 60                   # 代理有效期（秒），过期后异步重新检测
  per_proxy_timeout_sec: 10     # 单代理健康检测超时（秒）
  max_failures: 3               # 连续失败多少次进入冷却
  cooldown_base_sec: 120        # 基础冷却时间（秒），指数退避
  max_cooldown_sec: 1800        # 最长冷却时间（秒）
  max_proxy_retries: 3          # 单次请求最多换几个代理重试
  fallback_direct: true         # 全池不可用时是否直连兜底
  proxies:
    - { url: "http://127.0.0.1:18001", name: "香港-进阶IEPL 01" }
    - { url: "http://127.0.0.1:18002", name: "香港-进阶IEPL 03" }
